name: Generate contribution snake

on:
  schedule:
    - cron: "0 */12 * * *" # twice a day
  workflow_dispatch: # allow manual runs
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake-dark.svg?palette=github-dark&color_snake=22D3EE&color_dots=161B22,1f6feb,7C3AED,a855f7,22D3EE
            dist/snake.svg?palette=github-light&color_snake=7C3AED

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
